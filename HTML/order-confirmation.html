<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - BatLuxe Beauty</title>
    <style>
        .confirmation-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            text-align: center;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .confirmation-icon {
            font-size: 4rem;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        .order-details {
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        
        .btn {
            display: inline-block;
            background: #e75480;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin: 10px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <!-- Your header content -->
    </header>

    <div class="confirmation-container">
        <div class="confirmation-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Thank You for Your Order!</h1>
        <p>Your order has been placed successfully and will be processed shortly.</p>
        
        <div class="order-details" id="orderDetails">
            <!-- Order details will be inserted here -->
        </div>
        
        <p>You will receive an email confirmation with your order details.</p>
        <div>
            <a href="shop.html" class="btn">Continue Shopping</a>
            <a href="home.html" class="btn">Back to Home</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <!-- Your footer content -->
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Retrieve order data
            const orderData = JSON.parse(localStorage.getItem('batluxe_last_order'));
            const orderDetails = document.getElementById('orderDetails');
            
            if (orderData) {
                orderDetails.innerHTML = `
                    <h3>Order Details</h3>
                    <p><strong>Order ID:</strong> ${orderData.orderId}</p>
                    <p><strong>Order Date:</strong> ${new Date(orderData.orderDate).toLocaleDateString()}</p>
                    <p><strong>Total Amount:</strong> $${orderData.total.toFixed(2)}</p>
                    <p><strong>Shipping to:</strong> ${orderData.customer.shipping.firstName} ${orderData.customer.shipping.lastName}</p>
                    <p><strong>Email:</strong> ${orderData.customer.shipping.email}</p>
                `;
            } else {
                orderDetails.innerHTML = '<p>No order details found.</p>';
            }
        });
    </script>
</body>
</html>
